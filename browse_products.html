<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Browse Products</title>
</head>
<body>
    <header>
        <img src="customer_logo.jpg.jpeg" alt="EcoCultivate Logo">
        <h1>Browse Products</h1>
    </header>
    <main>
        <h2>Available Products</h2>
        <div id="productListings">
            <div class="product-listing">
                <img src="images/apple.jpg" alt="Apples" class="product-image">
                <h3>Product Name: Apples</h3>
                <p>Farmer: Vasudhev</p>
                <p>Price: $2.00 per kg</p>
                <button onclick="alert('Added to cart!')">Add to Cart</button>
            </div>
            <div class="product-listing">
                <img src="images/tomato.jpg" alt="Tomatoes" class="product-image">
                <h3>Product Name: Tomatoes</h3>
                <p>Farmer: SriKrishna</p>
                <p>Price: $1.50 per kg</p>
                <button onclick="alert('Added to cart!')">Add to Cart</button>
            </div>
            <!-- Additional products can be added here -->
        </div>
    </main>
    <footer>
        <p>&copy; 2024 EcoCultivate</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
