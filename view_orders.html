<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Your Orders</title>
</head>
<body>
    <header>
        <img src="customer_logo.jpg.jpeg" alt="EcoCultivate Logo">
        <h1>Your Orders</h1>
    </header>
    <main>
        <h2>Your Previous Orders</h2>
        <div id="orderListings">
            <div class="order-listing">
                <h3>Order #001</h3>
                <p>Product: Apples</p>
                <p>Quantity: 10 kg</p>
                <p>Status: Delivered</p>
            </div>
            <div class="order-listing">
                <h3>Order #002</h3>
                <p>Product: Tomatoes</p>
                <p>Quantity: 5 kg</p>
                <p>Status: Pending</p>
            </div>
            <!-- Additional orders can be added here -->
        </div>
    </main>
    <footer>
        <p>&copy; 2024 EcoCultivate</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
